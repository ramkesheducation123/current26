    <script>
        // WebView Error Catcher
        window.onerror = function(msg, url, line) {
            if(window.hasShownError) return;
            window.hasShownError = true;
            setTimeout(function() {
                var noDataBox = document.getElementById("noDataBox");
                var noDataText = document.getElementById("noDataText");
                if(noDataBox && noDataText) {
                    noDataText.innerHTML = "App Error: " + msg + "<br>(Line: " + line + ")";
                    noDataBox.style.display = "block";
                }
            }, 1000);
        };

        // WebView Safe Storage Wrappers
        function safeGetItem(key, defaultValue = null) { try { return localStorage.getItem(key) || defaultValue; } catch(e) { return defaultValue; } }
        function safeSetItem(key, value) { try { localStorage.setItem(key, value); } catch(e) {} }
        function safeRemoveItem(key) { try { localStorage.removeItem(key); } catch(e) {} }
        function safeParse(key, defaultValue = '{}') { try { return JSON.parse(safeGetItem(key, defaultValue)) || JSON.parse(defaultValue); } catch(e) { return JSON.parse(defaultValue); } }

        const savedTheme = safeGetItem('theme', 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);
        window.appStartTime = Date.now();
        window.earlyFeeds = {};
        
        window.tabMemoryCache = {};
        window.lastFetchTimes = safeParse('lastFetchTimes', '{}');
        window.translationCache = safeParse('translationCache', '{}');
        
        try {
            const proxyBase = "https://sweet-base-34f7.kgfads100.workers.dev/?url=";
            const savedTab = parseInt(safeGetItem("selectedFeed", "0")) || 0;
            const tabUrls = [
                ["https://242310604.hs-sites-na2.com/tag/fact/rss.xml", "https://242310604.hs-sites-na2.com/tag/national/rss.xml"],
                ["https://timesofindia.indiatimes.com/rssfeedstopstories.cms"],
                [] 
            ];
            const lastFetch = window.lastFetchTimes[savedTab] || 0;
            if ((Date.now() - lastFetch > 5 * 60 * 1000) && tabUrls[savedTab] && tabUrls[savedTab].length > 0) {
                tabUrls[savedTab].forEach(url => {
                    const targetUrl = url + (url.indexOf('?') !== -1 ? '&' : '?') + "_t=" + window.appStartTime;
                    window.earlyFeeds[url] = fetch(proxyBase + encodeURIComponent(targetUrl), {cache: "no-store"})
                        .then(r => r.ok ? r.text() : null).catch(err => null);
                });
            }
        } catch(e) {}

const newsContainer = document.getElementById('newsContainer'); let pullToRefreshActive = false; let lastTapTime = 0; let isDragging = false; let clickPrevented = false; 

function handlePointerDown(e) {

newsContainer.addEventListener("click", (e) => { if(clickPrevented) { e.preventDefault(); e.stopPropagation(); clickPrevented = false; } }, true);

function handleDoubleTap() {
    const article = articles[currentIndex]; if(!article || article.isPromo || article.isDiscovery) return;

}
function showNextFlip() { if (currentIndex >= articles.length - 1) { showToast("ताज़ा खबरे लोड हो रही हैं...", "fas fa-sync fa-spin"); return; } stopAudio(); vibrate([10]); currentIndex++; markAsRead(currentIndex); updateSlide(); if (tutorialStep === 0) progressTutorialToDown(); }

      const now = Date.now(); const lastFetch = window.lastFetchTimes[selectedFeedIndex] || 0;
      if (now - lastFetch > 5 * 60 * 1000) { fetchFeedsData(false).then(allItems => { window.lastFetchTimes[selectedFeedIndex] = Date.now(); safeSetItem('lastFetchTimes', JSON.stringify(window.lastFetchTimes)); let existingLinks = new Set(allFetchedArticles.map(a => a.link)); let newArticles = allItems.filter(a => !existingLinks.has(a.link) && a.link && a.link.indexOf('go:') !== 0); if (newArticles.length > 0) injectNewItems(newArticles); else showToast("कोई नई खबर नहीं मिली", "fas fa-check-circle", "#34c759"); }); } else { showToast("आप पहले से ही अपडेटेड हैं", "fas fa-check-circle", "#34c759"); } return;

}

function fitCardText(card, attempts) {
    attempts = attempts || 0;
    if (card.classList.contains('font-fitted') || attempts > 10) return;
    const bottomSection = card.querySelector('.bottom-section'); const title = card.querySelector('.feed-title'); const desc = card.querySelector('.feed-desc');
    if (!bottomSection || !title || !desc) return;
    const availableHeight = bottomSection.clientHeight - title.clientHeight - 85; 
    if (availableHeight <= 0) { requestAnimationFrame(() => fitCardText(card, attempts + 1)); return; }
    desc.style.display = 'block'; desc.style.webkitLineClamp = 'unset';
    let currentSize = 17; let minSize = 10; const applySize = (size) => { desc.style.fontSize = size + 'px'; desc.style.lineHeight = '1.5'; }; applySize(currentSize);
    while (desc.scrollHeight > availableHeight && currentSize > minSize) { currentSize -= 0.5; applySize(currentSize); }
    if (desc.scrollHeight > availableHeight) { const maxLines = Math.floor(availableHeight / (minSize * 1.5)); desc.style.display = '-webkit-box'; desc.style.webkitLineClamp = String(maxLines > 0 ? maxLines : 1); desc.style.webkitBoxOrient = 'vertical'; desc.style.overflow = 'hidden'; }
    card.classList.add('font-fitted');
}

      updateProgressBar(); const cards = document.querySelectorAll(".news-card");
      Array.from(cards).forEach((card) => {
        const index = parseInt(card.getAttribute('data-index')); const diff = index - currentIndex;
        if(Math.abs(diff) > 2) { card.style.display = 'none'; return; } card.style.display = 'flex';

        } else if (diff < 0) { card.style.transform = `translate3d(0, -100%, 0) scale(0.95)`; card.style.opacity = '0'; card.style.zIndex = '5';
        } else { card.style.transform = `translate3d(0, 100%, 0) scale(0.95)`; card.style.opacity = '0'; card.style.zIndex = '5'; if(diff === 1) { const img = card.querySelector('.feed-img'); if(img && !img.src) { img.src = img.getAttribute('data-src'); img.onload = () => img.classList.add('loaded'); } if(!card.classList.contains('promo-card') && !card.classList.contains('discovery-card-wrap')) requestAnimationFrame(() => fitCardText(card, 0)); } }

// ==========================================
// AUDIO SYSTEM (CRASH FIX FOR APP CREATOR 24)
// ==========================================
let currentSpeech = null; let readingCard = null; let wordSpans = []; let availableVoices = [];
let audioQueue = []; 

// 1. एक ही ग्लोबल ऑडियो प्लेयर बनाएँ (ताकि WebView इसे 'Autoplay' समझ कर ब्लॉक न करे)
let universalAudioPlayer = new Audio(); 

function loadVoices() { try { if ('speechSynthesis' in window) availableVoices = window.speechSynthesis.getVoices(); } catch(e) {} }
try { if ('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged = loadVoices; } catch(e) {}

// 2. इवेंट्स को सिर्फ एक बार जोड़ें
universalAudioPlayer.onended = playNextAudioChunk;
universalAudioPlayer.onerror = playNextAudioChunk; // अगर कोई लिंक फेल हो तो अगला चलाएं

function stopAudio() {
    try { if('speechSynthesis' in window) window.speechSynthesis.cancel(); } catch(e) {}
    
    // मैन्युअल ऑडियो प्लेयर को रोकें
    universalAudioPlayer.pause(); 
    universalAudioPlayer.src = ""; 
    audioQueue = []; 
    
    if(readingCard) { 
        Array.from(readingCard.querySelectorAll('.tts-word')).forEach(s => s.classList.remove('active-word')); 
        const btn = readingCard.querySelector('.btn-audio'); 
        if(btn) btn.innerHTML = '<i class="fas fa-volume-up"></i>'; 
        const wave = readingCard.querySelector('.audio-wave'); 
        if(wave) wave.classList.remove('playing'); 
        readingCard = null; 
    }
}

function toggleAudio(btn) {
    vibrate([15]); 
    const card = btn.closest('.news-card'); 
    
    if (readingCard === card) { stopAudio(); return; } 
    stopAudio(); 
    
    readingCard = card; 
    btn.innerHTML = '<i class="fas fa-stop" style="color:var(--brand-color)"></i>'; 
    const wave = card.querySelector('.audio-wave'); 
    if(wave) wave.classList.add('playing');
    
    const titleEl = card.querySelector('.feed-title'); 
    const descEl = card.querySelector('.feed-desc');
    
    if (!card.dataset.ttsReady) {
        let fullText = "";
        const processElement = (el) => { 
            const walker = document.createTreeWalker(el, NodeFilter.SHOW_ALL, null, false); 
            const nodes = []; 
            while(walker.nextNode()) { if (walker.currentNode.nodeType === Node.TEXT_NODE || walker.currentNode.nodeName === 'BR') nodes.push(walker.currentNode); } 
            nodes.forEach(node => { 
                if (node.nodeName === 'BR') { fullText += " "; return; } 
                const text = node.nodeValue; if (!text.trim()) { fullText += text; return; } 
                const fragment = document.createDocumentFragment(); const regex = /(\S+)|(\s+)/g; let match; 
                while ((match = regex.exec(text)) !== null) { 
                    if (match[1]) { const span = document.createElement('span'); span.className = 'tts-word'; span.textContent = match[1]; span.dataset.start = fullText.length; fragment.appendChild(span); fullText += match[1]; } 
                    else if (match[2]) { fragment.appendChild(document.createTextNode(match[2])); fullText += match[2]; } 
                } 
                node.parentNode.replaceChild(fragment, node); 
            }); 
        };
        processElement(titleEl); fullText += ". "; processElement(descEl); 
        card.dataset.fullText = fullText.trim(); 
        card.dataset.ttsReady = "true";
    }
    
    const fullText = card.dataset.fullText; 
    const langCode = selectedLanguage === 'hi' ? 'hi-IN' : 'en-IN'; 
    wordSpans = Array.from(card.querySelectorAll('.tts-word')); 
    wordSpans.forEach(s => s.classList.remove('active-word'));

    // पहले मोबाइल का इनबिल्ट इंजन ट्राई करें
    try {
        if ('speechSynthesis' in window && window.speechSynthesis && availableVoices.length > 0) {
            currentSpeech = new SpeechSynthesisUtterance(fullText); 
            currentSpeech.lang = langCode;
            let bestVoice = availableVoices.find(v => v.lang.indexOf(langCode) !== -1 && (v.name.indexOf("Google") !== -1 || v.name.indexOf("Natural") !== -1 || v.name.indexOf("Premium") !== -1)); 
            if(!bestVoice) bestVoice = availableVoices.find(v => v.lang.indexOf(langCode) !== -1); 
            if(bestVoice) currentSpeech.voice = bestVoice;
            currentSpeech.rate = 0.95; currentSpeech.pitch = 1.0; let currentActiveIndex = -1;
            
            currentSpeech.onboundary = (e) => { 
                const charIndex = e.charIndex; 
                requestAnimationFrame(() => { 
                    let targetIndex = -1; 
                    for (let i = 0; i < wordSpans.length; i++) { 
                        const start = parseInt(wordSpans[i].dataset.start); 
                        if (start <= charIndex) { targetIndex = i; } else { break; } 
                    } 
                    if (targetIndex !== -1 && targetIndex !== currentActiveIndex) { 
                        if (currentActiveIndex !== -1 && wordSpans[currentActiveIndex]) wordSpans[currentActiveIndex].classList.remove('active-word'); 
                        wordSpans[targetIndex].classList.add('active-word'); currentActiveIndex = targetIndex; 
                    } 
                }); 
            };

            currentSpeech.onerror = () => playWithUniversalAPI(fullText, selectedLanguage); 
            window.speechSynthesis.speak(currentSpeech);
            return;
        }
    } catch(e) {}
    
    // इनबिल्ट इंजन न चलने पर API इस्तेमाल करें
    playWithUniversalAPI(fullText, selectedLanguage);
}

function playWithUniversalAPI(text, lang) {
    let words = text.split(" ");
    let chunks = [];
    let currentChunk = "";
    
    for (let i = 0; i < words.length; i++) {
        if ((currentChunk + words[i]).length > 150) { 
            chunks.push(currentChunk.trim()); 
            currentChunk = words[i] + " "; 
        } else { 
            currentChunk += words[i] + " "; 
        }
    }
    if (currentChunk.trim().length > 0) chunks.push(currentChunk.trim());
    
    audioQueue = chunks.map(chunk => `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(chunk)}&tl=${lang}&client=tw-ob`);
    playNextAudioChunk();
}

function playNextAudioChunk() {
    if (audioQueue.length === 0) { stopAudio(); return; }
    let url = audioQueue.shift();
    
    // उसी ऑडियो प्लेयर का सोर्स (src) बदल कर प्ले करें
